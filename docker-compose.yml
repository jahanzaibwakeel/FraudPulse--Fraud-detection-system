services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fraudpulse
      POSTGRES_USER: fraudpulse
      POSTGRES_PASSWORD: fraudpulse
    ports:
      - "15432:5432"
    volumes:
      - ./infra/db/migrations:/docker-entrypoint-initdb.d:ro
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraudpulse -d fraudpulse"]
      interval: 5s
      timeout: 5s
      retries: 20

  valkey:
    image: valkey/valkey:7.2-alpine
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    env_file: .env.example
    ports:
      - "14000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    env_file: .env.example
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      api:
        condition: service_started

  simulator:
    build:
      context: .
      dockerfile: services/simulator/Dockerfile
    env_file: .env.example
    environment:
      API_URL: http://api:4000
    depends_on:
      api:
        condition: service_started
      worker:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file: .env.example
    ports:
      - "13000:3000"
    depends_on:
      api:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "19090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api
      - worker

  grafana:
    image: grafana/grafana-oss:11.1.4
    ports:
      - "13001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: fraudpulse
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  postgres-data:
