name: FraudPulse CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: Build and unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Compose file
        run: docker compose config --quiet

      - name: Run tests
        run: npm test

      - name: Build workspaces
        run: npm run build

  docker-smoke:
    name: Docker smoke and E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start local stack
        run: docker compose up -d --build postgres valkey api worker simulator web

      - name: Wait for API
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:14000/health >/dev/null; then exit 0; fi
            sleep 3
          done
          docker compose logs api
          exit 1

      - name: Run smoke checks
        run: npm run smoke

      - name: Run dashboard E2E
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:13000
        run: npm run test:e2e -w @fraudpulse/web

      - name: Capture screenshots
        env:
          SCREENSHOT_BASE_URL: http://127.0.0.1:13000
          SCREENSHOT_DIR: ci-screenshots
        run: npm run screenshots

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: fraudpulse-dashboard-screenshots
          path: ci-screenshots/*.png

      - name: Show service logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop local stack
        if: always()
        run: docker compose down -v
