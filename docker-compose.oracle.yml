services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fraudpulse}
      POSTGRES_USER: ${POSTGRES_USER:-fraudpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - ./infra/db/migrations:/docker-entrypoint-initdb.d:ro
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fraudpulse} -d ${POSTGRES_DB:-fraudpulse}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  valkey:
    image: valkey/valkey:7.2-alpine
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    env_file: .env
    expose:
      - "4000"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      api:
        condition: service_started
    restart: unless-stopped

  simulator:
    build:
      context: .
      dockerfile: services/simulator/Dockerfile
    env_file: .env
    environment:
      API_URL: http://api:4000
    depends_on:
      api:
        condition: service_started
      worker:
        condition: service_started
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:?NEXT_PUBLIC_WS_URL is required}
        NEXT_PUBLIC_API_TOKEN: ${NEXT_PUBLIC_API_TOKEN:?NEXT_PUBLIC_API_TOKEN is required}
        NEXT_PUBLIC_REFRESH_MS: ${NEXT_PUBLIC_REFRESH_MS:-10000}
    env_file: .env
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web
      - api
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: ["monitoring"]
    ports:
      - "127.0.0.1:19090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api
      - worker
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:11.1.4
    profiles: ["monitoring"]
    ports:
      - "127.0.0.1:13001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD is required}
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
  grafana-data:
